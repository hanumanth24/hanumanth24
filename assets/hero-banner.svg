<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <!-- Animated dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1"/>
      <stop offset="35%" style="stop-color:#0A192F;stop-opacity:1"/>
      <stop offset="65%" style="stop-color:#003566;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#001845;stop-opacity:1"/>
    </linearGradient>

    <!-- Neon glow gradient for title -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1">
        <animate attributeName="stop-color" values="#00E5FF;#00BFFF;#7DF9FF;#00E5FF" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:1">
        <animate attributeName="stop-color" values="#00E5FF;#7DF9FF;#00BFFF;#00E5FF" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Subtitle gradient -->
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A8D8EA;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#E0F7FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A8D8EA;stop-opacity:1"/>
    </linearGradient>

    <!-- Wave bottom gradient -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#0099CC;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#003566;stop-opacity:0.8"/>
    </linearGradient>

    <!-- Glow filter for title -->
    <filter id="titleGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Glow filter for decorative lines -->
    <filter id="lineGlow" x="-5%" y="-100%" width="110%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Clip path for rounded rectangle -->
    <clipPath id="roundedClip">
      <rect width="1200" height="300" rx="0" ry="0"/>
    </clipPath>
  </defs>

  <!-- Main background -->
  <rect width="1200" height="300" fill="url(#bgGrad)" clip-path="url(#roundedClip)"/>

  <!-- Animated background circuit grid lines — horizontal -->
  <g opacity="0.08">
    <line x1="0" y1="50" x2="1200" y2="50" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="1200" y2="250" stroke="#00E5FF" stroke-width="0.5"/>
  </g>
  <!-- Vertical grid lines -->
  <g opacity="0.08">
    <line x1="100" y1="0" x2="100" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="1100" y1="0" x2="1100" y2="300" stroke="#00E5FF" stroke-width="0.5"/>
  </g>

  <!-- Animated scanning line -->
  <rect x="0" y="0" width="1200" height="2" fill="#00E5FF" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,300" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Left decorative bracket — left side -->
  <g filter="url(#lineGlow)">
    <line x1="60" y1="60" x2="60" y2="240" stroke="#00E5FF" stroke-width="2" opacity="0.7"/>
    <line x1="60" y1="60" x2="85" y2="60" stroke="#00E5FF" stroke-width="2" opacity="0.7"/>
    <line x1="60" y1="240" x2="85" y2="240" stroke="#00E5FF" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Right decorative bracket — right side -->
  <g filter="url(#lineGlow)">
    <line x1="1140" y1="60" x2="1140" y2="240" stroke="#00E5FF" stroke-width="2" opacity="0.7"/>
    <line x1="1140" y1="60" x2="1115" y2="60" stroke="#00E5FF" stroke-width="2" opacity="0.7"/>
    <line x1="1140" y1="240" x2="1115" y2="240" stroke="#00E5FF" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Decorative corner dots -->
  <circle cx="60" cy="60" r="4" fill="#00E5FF" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="240" r="4" fill="#00E5FF" opacity="0.9">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1140" cy="60" r="4" fill="#00E5FF" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1140" cy="240" r="4" fill="#00E5FF" opacity="0.9">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Top neon line accent -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#waveGrad)" opacity="0.9"/>

  <!-- Bottom neon line accent -->
  <rect x="0" y="297" width="1200" height="3" fill="url(#waveGrad)" opacity="0.9"/>

  <!-- Central glow blob behind title -->
  <ellipse cx="600" cy="130" rx="380" ry="80" fill="#003566" opacity="0.4">
    <animate attributeName="rx" values="380;420;380" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.6;0.4" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- AEM tag — top left -->
  <rect x="110" y="72" width="68" height="22" rx="4" fill="#FF0000" opacity="0.85"/>
  <text x="144" y="87" font-family="monospace" font-size="11" font-weight="bold" fill="white" text-anchor="middle">AEM</text>

  <!-- React tag — top right -->
  <rect x="1022" y="72" width="68" height="22" rx="4" fill="#20232A" opacity="0.9"/>
  <text x="1056" y="87" font-family="monospace" font-size="11" font-weight="bold" fill="#61DAFB" text-anchor="middle">REACT</text>

  <!-- Adobe Cloud tag — bottom left -->
  <rect x="110" y="207" width="110" height="22" rx="4" fill="#FF6B00" opacity="0.85"/>
  <text x="165" y="222" font-family="monospace" font-size="11" font-weight="bold" fill="white" text-anchor="middle">ADOBE CLOUD</text>

  <!-- NodeJS tag — bottom right -->
  <rect x="980" y="207" width="110" height="22" rx="4" fill="#1A3A1A" opacity="0.9"/>
  <text x="1035" y="222" font-family="monospace" font-size="11" font-weight="bold" fill="#339933" text-anchor="middle">NODE.JS</text>

  <!-- MAIN TITLE: HANUMANTH REDDY — glow shadow layer -->
  <text
    x="600" y="142"
    font-family="'Segoe UI', 'Arial Black', Arial, sans-serif"
    font-size="62"
    font-weight="900"
    fill="#00E5FF"
    text-anchor="middle"
    opacity="0.25"
    filter="url(#titleGlow)"
    letter-spacing="4"
  >HANUMANTH REDDY</text>

  <!-- MAIN TITLE: HANUMANTH REDDY — crisp layer -->
  <text
    x="600" y="142"
    font-family="'Segoe UI', 'Arial Black', Arial, sans-serif"
    font-size="62"
    font-weight="900"
    fill="url(#titleGrad)"
    text-anchor="middle"
    letter-spacing="4"
  >HANUMANTH REDDY</text>

  <!-- Thin separator line under title -->
  <line x1="250" y1="158" x2="950" y2="158" stroke="url(#waveGrad)" stroke-width="1.5" opacity="0.6"/>

  <!-- SUBTITLE -->
  <text
    x="600" y="195"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="18"
    font-weight="400"
    fill="url(#subGrad)"
    text-anchor="middle"
    letter-spacing="1.5"
    opacity="0.95"
  >Senior AEM Developer  ·  React &amp; Full Stack Engineer  ·  Adobe Experience Cloud Specialist</text>

  <!-- Tagline under subtitle -->
  <text
    x="600" y="230"
    font-family="'Courier New', monospace"
    font-size="12"
    fill="#4A90D9"
    text-anchor="middle"
    letter-spacing="3"
    opacity="0.7"
  >AEM  ·  REACT  ·  ADOBE CLOUD  ·  CI/CD  ·  ENTERPRISE  ·  PERFORMANCE</text>

  <!-- Animated status dot + text — bottom centre -->
  <circle cx="558" cy="262" r="5" fill="#00C851">
    <animate attributeName="r" values="5;7;5" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="570" y="267" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#00C851" letter-spacing="1.5" opacity="0.9">OPEN TO SENIOR ROLES</text>

  <!-- Top-right small label -->
  <text x="1100" y="30" font-family="monospace" font-size="10" fill="#00E5FF" text-anchor="middle" opacity="0.4" letter-spacing="2">v2025</text>

</svg>
